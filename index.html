  <!-- hosted at https://majdch22.github.io -->
  <iframe id="w"
    src="https://app.hubspot.com/conversations-visitor/PORTALID/threads/utk/anytoken?url=https://majdch22.github.io"
  ></iframe>

  <div id="log"></div>

  <script>
  const log = s => document.getElementById('log').innerHTML += '<br>' + s;

  // Step 1: Listen for ANY message coming back from the widget
  // The widget sends window.parent.postMessage(..., "*") so we receive everything
  window.addEventListener('message', e => {
    if (!e.origin.includes('hubspot')) return;
    log('✅ RECEIVED from widget: origin=' + e.origin + ' data=' +
        JSON.stringify(e.data).substring(0, 200));
  });

  // Step 2: Send injected message once iframe loads
  document.getElementById('w').addEventListener('load', () => {
    log('iframe loaded, sending...');

    // Test with REQUEST_OPEN (harmless, visually verifiable)
    document.getElementById('w').contentWindow.postMessage(
      JSON.stringify({ type: 'REQUEST_OPEN', data: {} }),
      '*'   // must use * because HubSpot's iframe is cross-origin
    );

    log('message sent — watch iframe for widget opening');
  });
  </script>
